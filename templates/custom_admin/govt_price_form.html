{% extends "custom_admin/base.html" %}
{% block title %}সরকারি মূল্য যোগ{% endblock %}
{% block page_title %}সরকারি মূল্য যোগ/আপডেট{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div><label class="block text-sm font-medium text-gray-700 mb-1">পণ্য</label>
                <select name="product" required class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm">
                    <option value="">-- পণ্য নির্বাচন --</option>
                    {% for p in products %}<option value="{{ p.pk }}">{{ p.name }} ({{ p.name_en }})</option>{% endfor %}
                </select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">সরকারি মূল্য (৳)</label>
                <input type="number" name="price" step="0.01" required class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">কার্যকর তারিখ</label>
                <input type="date" name="effective_date" value="{{ today }}" required class="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm"></div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="px-6 py-2.5 bg-primary-600 text-white font-medium rounded-lg hover:bg-primary-700 transition"><i class="fas fa-save mr-1"></i> সংরক্ষণ</button>
                <a href="{% url 'custom_admin:govt_price_list' %}" class="px-6 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">বাতিল</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
