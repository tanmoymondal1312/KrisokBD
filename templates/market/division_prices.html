{% extends "base.html" %}

{% block title %}বিভাগ ও পণ্যভিত্তিক দর - কৃষক বিডি{% endblock %}

{% block extra_head %}
<meta name="description" content="বিভাগ ও পণ্যভিত্তিক পাইকারি বাজার দর তুলনা। ঢাকা, চট্টগ্রাম, রাজশাহী, রংপুর সহ সকল বিভাগের দাম একসাথে দেখুন।">
{% endblock %}

{% block content %}
<section class="py-8 md:py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800">বিভাগ ও পণ্যভিত্তিক পাইকারি দর</h1>
                <p class="text-gray-500 text-sm mt-1">
                    <i class="fas fa-calendar-alt mr-1"></i> তারিখ: {{ price_date|date:"d M, Y" }}
                </p>
            </div>
            <a href="{% url 'core:home' %}" class="text-sm text-primary-600 hover:text-primary-700">
                <i class="fas fa-arrow-left mr-1"></i> হোম
            </a>
        </div>

        <!-- Product Filter -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-6">
            <label class="block text-xs text-gray-500 mb-1">পণ্য নির্বাচন করুন (সকল বিভাগের দর তুলনা)</label>
            <select hx-get="{% url 'market:division_prices' %}"
                    hx-target="#division-data"
                    name="product"
                    class="w-full sm:w-72 px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                <option value="">-- পণ্য নির্বাচন করুন --</option>
                {% for product in products %}
                <option value="{{ product.slug }}" {% if selected_product and selected_product.slug == product.slug %}selected{% endif %}>
                    {{ product.name }} ({{ product.name_en }})
                </option>
                {% endfor %}
            </select>
        </div>

        <div id="division-data">
            {% include "market/partials/division_table.html" %}
        </div>

    </div>
</section>
{% endblock %}
