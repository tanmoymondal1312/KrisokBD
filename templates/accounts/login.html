{% extends "base.html" %}

{% block title %}লগইন - কৃষক বিডি{% endblock %}

{% block content %}
<section class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <a href="{% url 'core:home' %}" class="inline-flex items-center gap-2 mb-4">
                <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-leaf text-white text-lg"></i>
                </div>
                <span class="text-2xl font-bold text-primary-700">কৃষক</span><span class="text-2xl font-bold text-gray-700">বিডি</span>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">লগইন করুন</h1>
            <p class="text-gray-500 text-sm mt-1">আপনার অ্যাকাউন্টে প্রবেশ করুন</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
            {% if form.non_field_errors %}
            <div class="bg-red-50 border border-red-200 rounded-lg p-3 mb-4">
                <p class="text-sm text-red-700"><i class="fas fa-exclamation-circle mr-1"></i> ইউজারনেম বা পাসওয়ার্ড ভুল হয়েছে।</p>
            </div>
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ইউজারনেম</label>
                    <input type="text" name="username" value="{{ form.username.value|default:'' }}"
                           placeholder="ইউজারনেম"
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">পাসওয়ার্ড</label>
                    <div class="relative" x-data="{ show: false }">
                        <input :type="show ? 'text' : 'password'" name="password"
                               placeholder="পাসওয়ার্ড"
                               class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition pr-10">
                        <button type="button" @click="show = !show" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i :class="show ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full py-3 bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-lg transition shadow-sm">
                    <i class="fas fa-sign-in-alt mr-2"></i> লগইন
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 mt-4">
            অ্যাকাউন্ট নেই?
            <a href="{% url 'accounts:register' %}" class="text-primary-600 font-medium hover:underline">ফ্রি রেজিস্ট্রেশন করুন</a>
        </p>
    </div>
</section>
{% endblock %}
